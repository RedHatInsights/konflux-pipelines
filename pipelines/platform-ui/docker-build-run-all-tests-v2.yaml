#
# README
# This pipeline definition contains custom tasks which are identified as such near the end of this file.
# This is v2 of the pipeline with flexible secret management using envFrom.
#
apiVersion: tekton.dev/v1
kind: Pipeline
metadata:
  name: docker-build-v2
  labels:
    build.appstudio.redhat.com/pipeline: docker-build-v2
spec:
  description: |
    This pipeline is ideal for building container images from a Containerfile while reducing network traffic.

    _Uses `buildah` to create a container image. It also optionally creates a source image and runs some build-time tests. EC will flag a violation for [`trusted_task.trusted`](https://enterprisecontract.dev/docs/ec-policies/release_policy.html#trusted_task__trusted) if any tasks are added to the pipeline.
    This pipeline is pushed as a Tekton bundle to [quay.io](https://quay.io/repository/konflux-ci/tekton-catalog/pipeline-docker-build?tab=tags)_
  finally:
  - name: show-sbom
    params:
    - name: IMAGE_URL
      value: $(tasks.build-image-index.results.IMAGE_URL)
    taskRef:
      params:
      - name: name
        value: show-sbom
      - name: bundle
        value: quay.io/konflux-ci/tekton-catalog/task-show-sbom:0.1@sha256:04994df487ee886adbe60a8a5866647fbdfd53cc26f7b2554272ba51bf7af29e
      - name: kind
        value: task
      resolver: bundles
  - name: show-summary
    params:
    - name: pipelinerun-name
      value: $(context.pipelineRun.name)
    - name: git-url
      value: $(tasks.clone-repository.results.url)?rev=$(tasks.clone-repository.results.commit)
    - name: image-url
      value: $(params.output-image)
    - name: build-task-status
      value: $(tasks.build-image-index.status)
    taskRef:
      params:
      - name: name
        value: summary
      - name: bundle
        value: quay.io/konflux-ci/tekton-catalog/task-summary:0.2@sha256:526555c9d77ca9e97c52ee6bfcd097fbedc1f3442084367c936af4faa69951e8
      - name: kind
        value: task
      resolver: bundles
    workspaces:
    - name: workspace
      workspace: workspace
  params:
  - description: Source Repository URL
    name: git-url
    type: string
  - default: ""
    description: Revision of the Source Repository
    name: revision
    type: string
  - description: Fully Qualified Output Image
    name: output-image
    type: string
  - default: .
    description: Path to the source code of an application's component from where to build image.
    name: path-context
    type: string
  - default: Dockerfile
    description: Path to the Dockerfile inside the context specified by parameter path-context
    name: dockerfile
    type: string
  - default: "false"
    description: Force rebuild image
    name: rebuild
    type: string
  - default: "false"
    description: Skip checks against built image
    name: skip-checks
    type: string
  - default: "false"
    description: Execute the build with network isolation
    name: hermetic
    type: string
  - default: ""
    description: Build dependencies to be prefetched by Cachi2
    name: prefetch-input
    type: string
  - default: ""
    description: Image tag expiration time, time values could be something like 1h, 2d, 3w for hours, days, and weeks, respectively.
    name: image-expires-after
  - default: "true"
    description: Build a source image.
    name: build-source-image
    type: string
  - default: "false"
    description: Add built image into an OCI image index
    name: build-image-index
    type: string
  - default: []
    description: Array of --build-arg values ("arg=value" strings) for buildah
    name: build-args
    type: array
  - default: ""
    description: Path to a file with build arguments for buildah, see https://www.mankier.com/1/buildah-build#--build-arg-file
    name: build-args-file
    type: string
  - default: []
    description: Array of image labels to be applied to resulting image
    name: labels
    type: array
  - default: []
    description: Array of image annotations to be applied to resulting image
    name: annotations
    type: array
    # Custom param (not generated by Konflux)
  - description: Script run before unit tests to set up workspace (e.g., npm install)
    name: workspace-setup-script
    type: string
    default: ""
  - description: Script run while executing the run-unit-tests custom task
    name: unit-tests-script
    type: string
  - description: Image to use for running unit tests
    name: unit-test-image
    type: string
    default: "registry.access.redhat.com/ubi9/nodejs-22:latest"
    # Custom params for e2e testing (not generated by Konflux)
  - description: Script run while executing the run-e2e-tests custom task
    name: e2e-tests-script
    type: string
  - description: Script run by the run-application sidecar
    name: run-app-script
    type: string
  - description: Name of ConfigMap containing proxy routes data
    name: frontend-proxy-routes-configmap
    type: string
    default: ""
  - description: Application port (default 8000)
    name: e2e-app-port
    type: string
    default: "8000"
  - description: Playwright image to use for testing
    name: e2e-playwright-image
    type: string
    default: "quay.io/btweed/playwright_e2e:latest"
  - description: Frontend proxy image
    name: e2e-proxy-image
    type: string
    default: "quay.io/redhat-user-workloads/hcc-platex-services-tenant/frontend-development-proxy:latest"
  - name: buildah-format
    default: docker
    type: string
    description: The format for the resulting image's mediaType. Valid values are oci or docker.
  - name: enable-cache-proxy
    default: 'false'
    description: Enable cache proxy configuration
    type: string
  - name: e2e-credentials-secret
    description: Name of the secret containing e2e test credentials
    type: string
    default: ""
  - name: e2e-hcc-env
    description: HCC environment (e.g., stage, prod)
    type: string
    default: "stage"
  - name: e2e-hcc-env-url
    description: HCC environment URL
    type: string
    default: "https://console.stage.redhat.com"
  results:
  - description: ""
    name: IMAGE_URL
    value: $(tasks.build-image-index.results.IMAGE_URL)
  - description: ""
    name: IMAGE_DIGEST
    value: $(tasks.build-image-index.results.IMAGE_DIGEST)
  - description: ""
    name: CHAINS-GIT_URL
    value: $(tasks.clone-repository.results.url)
  - description: ""
    name: CHAINS-GIT_COMMIT
    value: $(tasks.clone-repository.results.commit)
  tasks:
  - name: init
    params:
    - name: image-url
      value: $(params.output-image)
    - name: rebuild
      value: $(params.rebuild)
    - name: skip-checks
      value: $(params.skip-checks)
    - name: enable-cache-proxy
      value: $(params.enable-cache-proxy)
    taskRef:
      params:
      - name: name
        value: init
      - name: bundle
        value: quay.io/konflux-ci/tekton-catalog/task-init:0.4@sha256:288f3106118edc1d0f0c79a89c960abf5841a4dd8bc3f38feb10527253105b19
      - name: kind
        value: task
      resolver: bundles
  - name: clone-repository
    params:
    - name: url
      value: $(params.git-url)
    - name: revision
      value: $(params.revision)
    runAfter:
    - init
    taskRef:
      params:
      - name: name
        value: git-clone
      - name: bundle
        value: quay.io/konflux-ci/tekton-catalog/task-git-clone:0.1@sha256:7db7ad9653dccc771407cb0294487cf4be9064fa782ffad7e983db1a8ba57e21
      - name: kind
        value: task
      resolver: bundles
    workspaces:
    - name: output
      workspace: workspace
    - name: basic-auth
      workspace: git-auth
  - name: prefetch-dependencies
    params:
    - name: input
      value: $(params.prefetch-input)
    runAfter:
    - clone-repository
    taskRef:
      params:
      - name: name
        value: prefetch-dependencies
      - name: bundle
        value: quay.io/konflux-ci/tekton-catalog/task-prefetch-dependencies:0.3@sha256:d5b388dbab4605f2bb1fe6a561dcdad51a73cf74fc0a646cc0541934acae40a8
      - name: kind
        value: task
      resolver: bundles
    when:
    - input: $(params.prefetch-input)
      operator: notin
      values:
      - ""
    workspaces:
    - name: source
      workspace: workspace
    - name: git-basic-auth
      workspace: git-auth
    - name: netrc
      workspace: netrc
  - name: build-container
    params:
    - name: IMAGE
      value: $(params.output-image)
    - name: DOCKERFILE
      value: $(params.dockerfile)
    - name: CONTEXT
      value: $(params.path-context)
    - name: HERMETIC
      value: $(params.hermetic)
    - name: PREFETCH_INPUT
      value: $(params.prefetch-input)
    - name: IMAGE_EXPIRES_AFTER
      value: $(params.image-expires-after)
    - name: COMMIT_SHA
      value: $(tasks.clone-repository.results.commit)
    - name: BUILD_ARGS
      value:
      - $(params.build-args[*])
    - name: BUILD_ARGS_FILE
      value: $(params.build-args-file)
    - name: LABELS
      value:
      - $(params.labels[*])
    - name: ANNOTATIONS
      value:
      - $(params.annotations[*])
    - name: BUILDAH_FORMAT
      value: $(params.buildah-format)
    - name: HTTP_PROXY
      value: $(tasks.init.results.http-proxy)
    - name: NO_PROXY
      value: $(tasks.init.results.no-proxy)
    runAfter:
    - prefetch-dependencies
    taskRef:
      params:
      - name: name
        value: buildah
      - name: bundle
        value: quay.io/konflux-ci/tekton-catalog/task-buildah:0.9@sha256:3b5da48a5dcfdce958ba69b11860b1527b3745fa1529a5ba8fb774d3523014f9
      - name: kind
        value: task
      resolver: bundles
    workspaces:
    - name: source
      workspace: workspace
  - name: build-image-index
    params:
    - name: IMAGE
      value: $(params.output-image)
    - name: ALWAYS_BUILD_INDEX
      value: $(params.build-image-index)
    - name: IMAGES
      value:
      - $(tasks.build-container.results.IMAGE_URL)@$(tasks.build-container.results.IMAGE_DIGEST)
    - name: BUILDAH_FORMAT
      value: $(params.buildah-format)
    runAfter:
    - build-container
    taskRef:
      params:
      - name: name
        value: build-image-index
      - name: bundle
        value: quay.io/konflux-ci/tekton-catalog/task-build-image-index:0.3@sha256:ae3fa44f005054d4901d33413972227b5642d376968a67791535cdcc2e98473d
      - name: kind
        value: task
      resolver: bundles
  - name: build-source-image
    params:
    - name: BINARY_IMAGE
      value: $(tasks.build-image-index.results.IMAGE_URL)
    - name: BINARY_IMAGE_DIGEST
      value: $(tasks.build-image-index.results.IMAGE_DIGEST)
    runAfter:
    - build-image-index
    taskRef:
      params:
      - name: name
        value: source-build
      - name: bundle
        value: quay.io/konflux-ci/tekton-catalog/task-source-build:0.3@sha256:ac287eb912f442ef67311f6be71ff52d4be71f41d212ca49199a74a4150f84e5
      - name: kind
        value: task
      resolver: bundles
    when:
    - input: $(params.build-source-image)
      operator: in
      values:
      - "true"
    workspaces:
    - name: workspace
      workspace: workspace
  - name: deprecated-base-image-check
    params:
    - name: IMAGE_URL
      value: $(tasks.build-image-index.results.IMAGE_URL)
    - name: IMAGE_DIGEST
      value: $(tasks.build-image-index.results.IMAGE_DIGEST)
    runAfter:
    - build-image-index
    taskRef:
      params:
      - name: name
        value: deprecated-image-check
      - name: bundle
        value: quay.io/konflux-ci/tekton-catalog/task-deprecated-image-check:0.5@sha256:5ff16b7e6b4a8aa1adb352e74b9f831f77ff97bafd1b89ddb0038d63335f1a67
      - name: kind
        value: task
      resolver: bundles
    when:
    - input: $(params.skip-checks)
      operator: in
      values:
      - "false"
  - name: clair-scan
    params:
    - name: image-digest
      value: $(tasks.build-image-index.results.IMAGE_DIGEST)
    - name: image-url
      value: $(tasks.build-image-index.results.IMAGE_URL)
    runAfter:
    - build-image-index
    taskRef:
      params:
      - name: name
        value: clair-scan
      - name: bundle
        value: quay.io/konflux-ci/tekton-catalog/task-clair-scan:0.3@sha256:89924756c91ded746cf9ccc9f07907595e5b2454ddda0219132913a4875a5f59
      - name: kind
        value: task
      resolver: bundles
    when:
    - input: $(params.skip-checks)
      operator: in
      values:
      - "false"
  - name: ecosystem-cert-preflight-checks
    params:
    - name: image-url
      value: $(tasks.build-image-index.results.IMAGE_URL)
    runAfter:
    - build-image-index
    taskRef:
      params:
      - name: name
        value: ecosystem-cert-preflight-checks
      - name: bundle
        value: quay.io/konflux-ci/tekton-catalog/task-ecosystem-cert-preflight-checks:0.2@sha256:b4ac586edea81dcd25dfc17f1bd57899825be2b443e48d572cd05ce058f153bb
      - name: kind
        value: task
      resolver: bundles
    when:
    - input: $(params.skip-checks)
      operator: in
      values:
      - "false"
  - name: sast-snyk-check
    params:
    - name: image-digest
      value: $(tasks.build-image-index.results.IMAGE_DIGEST)
    - name: image-url
      value: $(tasks.build-image-index.results.IMAGE_URL)
    runAfter:
    - build-image-index
    taskRef:
      params:
      - name: name
        value: sast-snyk-check
      - name: bundle
        value: quay.io/konflux-ci/tekton-catalog/task-sast-snyk-check:0.4@sha256:4629221cb84f878382df5ddb65ebf83f2b8f3b0edbcb85067fc9bfc2805f606c
      - name: kind
        value: task
      resolver: bundles
    when:
    - input: $(params.skip-checks)
      operator: in
      values:
      - "false"
    workspaces:
    - name: workspace
      workspace: workspace
  - name: clamav-scan
    params:
    - name: image-digest
      value: $(tasks.build-image-index.results.IMAGE_DIGEST)
    - name: image-url
      value: $(tasks.build-image-index.results.IMAGE_URL)
    runAfter:
    - build-image-index
    taskRef:
      params:
      - name: name
        value: clamav-scan
      - name: bundle
        value: quay.io/konflux-ci/tekton-catalog/task-clamav-scan:0.3@sha256:9f18b216ce71a66909e7cb17d9b34526c02d73cf12884ba32d1f10614f7b9f5a
      - name: kind
        value: task
      resolver: bundles
    when:
    - input: $(params.skip-checks)
      operator: in
      values:
      - "false"
  - name: sast-coverity-check
    params:
    - name: image-digest
      value: $(tasks.build-container.results.IMAGE_DIGEST)
    - name: image-url
      value: $(tasks.build-container.results.IMAGE_URL)
    - name: IMAGE
      value: $(params.output-image)
    - name: DOCKERFILE
      value: $(params.dockerfile)
    - name: CONTEXT
      value: $(params.path-context)
    - name: HERMETIC
      value: $(params.hermetic)
    - name: PREFETCH_INPUT
      value: $(params.prefetch-input)
    - name: IMAGE_EXPIRES_AFTER
      value: $(params.image-expires-after)
    - name: COMMIT_SHA
      value: $(tasks.clone-repository.results.commit)
    - name: BUILD_ARGS
      value:
      - $(params.build-args[*])
    - name: BUILD_ARGS_FILE
      value: $(params.build-args-file)
    runAfter:
    - coverity-availability-check
    taskRef:
      params:
      - name: name
        value: sast-coverity-check
      - name: bundle
        value: quay.io/konflux-ci/tekton-catalog/task-sast-coverity-check:0.3@sha256:f44de9d91535f0213d747bbbf75ee7f2e69a607a8c9a5ea7ef26bf738e66995a
      - name: kind
        value: task
      resolver: bundles
    when:
    - input: $(params.skip-checks)
      operator: in
      values:
      - "false"
    - input: $(tasks.coverity-availability-check.results.STATUS)
      operator: in
      values:
      - success
    workspaces:
    - name: source
      workspace: workspace
  - name: coverity-availability-check
    runAfter:
    - build-image-index
    taskRef:
      params:
      - name: name
        value: coverity-availability-check
      - name: bundle
        value: quay.io/konflux-ci/tekton-catalog/task-coverity-availability-check:0.2@sha256:8b501440a960aec446db2ebc6625a49d0317a9fc7bf0f7bd9b18cb63052db7de
      - name: kind
        value: task
      resolver: bundles
    when:
    - input: $(params.skip-checks)
      operator: in
      values:
      - "false"
  - name: sast-shell-check
    params:
    - name: image-digest
      value: $(tasks.build-image-index.results.IMAGE_DIGEST)
    - name: image-url
      value: $(tasks.build-image-index.results.IMAGE_URL)
    runAfter:
    - build-image-index
    taskRef:
      params:
      - name: name
        value: sast-shell-check
      - name: bundle
        value: quay.io/konflux-ci/tekton-catalog/task-sast-shell-check:0.1@sha256:2cd09c97b9f0fae9c7bcd26d956f77221fb7137ee8b2ef17e7351b5e6f1eb89e
      - name: kind
        value: task
      resolver: bundles
    when:
    - input: $(params.skip-checks)
      operator: in
      values:
      - "false"
    workspaces:
    - name: workspace
      workspace: workspace
  - name: sast-unicode-check
    params:
    - name: image-digest
      value: $(tasks.build-image-index.results.IMAGE_DIGEST)
    - name: image-url
      value: $(tasks.build-image-index.results.IMAGE_URL)
    runAfter:
    - build-image-index
    taskRef:
      params:
      - name: name
        value: sast-unicode-check
      - name: bundle
        value: quay.io/konflux-ci/tekton-catalog/task-sast-unicode-check:0.4@sha256:fd7c78e9b0375a9e92f235a0173e85de3371cd00d33e8ed212647279525aadd1
      - name: kind
        value: task
      resolver: bundles
    when:
    - input: $(params.skip-checks)
      operator: in
      values:
      - "false"
    workspaces:
    - name: workspace
      workspace: workspace
  - name: apply-tags
    params:
    - name: IMAGE_URL
      value: $(tasks.build-image-index.results.IMAGE_URL)
    - name: IMAGE_DIGEST
      value: $(tasks.build-image-index.results.IMAGE_DIGEST)
    runAfter:
    - build-image-index
    taskRef:
      params:
      - name: name
        value: apply-tags
      - name: bundle
        value: quay.io/konflux-ci/tekton-catalog/task-apply-tags:0.3@sha256:aa62b41861c09e2e59c69cc6e9a1f740bf0c81e6a1eb03f57f59dfda0f65840e
      - name: kind
        value: task
      resolver: bundles
  - name: push-dockerfile
    params:
    - name: IMAGE
      value: $(tasks.build-image-index.results.IMAGE_URL)
    - name: IMAGE_DIGEST
      value: $(tasks.build-image-index.results.IMAGE_DIGEST)
    - name: DOCKERFILE
      value: $(params.dockerfile)
    - name: CONTEXT
      value: $(params.path-context)
    runAfter:
    - build-image-index
    taskRef:
      params:
      - name: name
        value: push-dockerfile
      - name: bundle
        value: quay.io/konflux-ci/tekton-catalog/task-push-dockerfile:0.3@sha256:64210c6d94ab467e1f8e1666e037060bd73942d65f5044bb63804470667ab3a2
      - name: kind
        value: task
      resolver: bundles
    workspaces:
    - name: workspace
      workspace: workspace
  - name: rpms-signature-scan
    params:
    - name: image-url
      value: $(tasks.build-image-index.results.IMAGE_URL)
    - name: image-digest
      value: $(tasks.build-image-index.results.IMAGE_DIGEST)
    runAfter:
    - build-image-index
    taskRef:
      params:
      - name: name
        value: rpms-signature-scan
      - name: bundle
        value: quay.io/konflux-ci/tekton-catalog/task-rpms-signature-scan:0.2@sha256:1bd72f07e607b41fc2f1ef1fd0fb840699e49f113128b5dc0b387b5c2757cb38
      - name: kind
        value: task
      resolver: bundles
    when:
    - input: $(params.skip-checks)
      operator: in
      values:
      - "false"
    # Custom task (not generated by Konflux)
  - name: clone-repository-oci-ta
    params:
    - name: url
      value: $(params.git-url)
    - name: revision
      value: $(params.revision)
    - name: ociStorage
      value: $(params.output-image).git
    runAfter:
    - init
    taskRef:
      params:
      - name: name
        value: git-clone-oci-ta
      - name: bundle
        value: quay.io/konflux-ci/tekton-catalog/task-git-clone-oci-ta:0.1@sha256:2c388d28651457db60bb90287e7d8c3680303197196e4476878d98d81e8b6dc9
      - name: kind
        value: task
      resolver: bundles
    workspaces:
    - name: basic-auth
      workspace: git-auth
    # Custom task (not generated by Konflux)
  - name: run-unit-tests
    description: Validates frontend unit tests
    params:
    - name: SOURCE_ARTIFACT
      value: $(tasks.clone-repository-oci-ta.results.SOURCE_ARTIFACT)
    - name: WORKSPACE_SETUP_SCRIPT
      value: $(params.workspace-setup-script)
    - name: UNIT_TESTS_SCRIPT
      value: $(params.unit-tests-script)
    - name: UNIT_TEST_IMAGE
      value: $(params.unit-test-image)
    runAfter:
    - clone-repository-oci-ta
    workspaces:
    - name: basic-auth
      workspace: git-auth
    - name: shared-workspace
      workspace: workspace
    taskSpec:
      params:
      - description: The Trusted Artifact URI pointing to the artifact with the application source code.
        name: SOURCE_ARTIFACT
        type: string
      - description: Script to run before unit tests (e.g., npm install)
        name: WORKSPACE_SETUP_SCRIPT
        type: string
      - description: Script to run unit tests
        name: UNIT_TESTS_SCRIPT
        type: string
      - description: Image to use for running unit tests
        name: UNIT_TEST_IMAGE
        type: string
      workspaces:
      - name: shared-workspace
        mountPath: /var/workdir
      steps:
      - name: use-trusted-artifact
        image: quay.io/redhat-appstudio/build-trusted-artifacts:latest@sha256:9b180776a41d9a22a1c51539f1647c60defbbd55b44bbebdd4130e33512d8b0d
        args:
        - use
        - $(params.SOURCE_ARTIFACT)=/var/workdir
      - image: $(params.UNIT_TEST_IMAGE)
        workingDir: /var/workdir
        name: workspace-setup
        securityContext:
          runAsUser: 0
        script: |
          #!/bin/bash
          if [ -n "$(params.WORKSPACE_SETUP_SCRIPT)" ]; then
            bash -c "$(params.WORKSPACE_SETUP_SCRIPT)"
          else
            echo "No workspace setup script provided, skipping..."
          fi
      - image: $(params.UNIT_TEST_IMAGE)
        workingDir: /var/workdir
        name: unit-tests
        securityContext:
          runAsUser: 0
        script: $(params.UNIT_TESTS_SCRIPT)
    # Custom task (not generated by Konflux)
  - name: run-e2e-tests
    description: Runs e2e tests against the built application
    params:
      - name: SOURCE_ARTIFACT
        value: $(tasks.clone-repository-oci-ta.results.SOURCE_ARTIFACT)
      - name: APPLICATION_IMAGE
        value: $(tasks.build-image-index.results.IMAGE_URL)
      - name: e2e-tests-script
        value: $(params.e2e-tests-script)
      - name: run-app-script
        value: $(params.run-app-script)
      - name: PROXY_ROUTES_CONFIGMAP
        value: $(params.frontend-proxy-routes-configmap)
      - name: APP_PORT
        value: $(params.e2e-app-port)
      - name: PLAYWRIGHT_IMAGE
        value: $(params.e2e-playwright-image)
      - name: PROXY_IMAGE
        value: $(params.e2e-proxy-image)
      - name: CREDENTIALS_SECRET
        value: $(params.e2e-credentials-secret)
      - name: HCC_ENV
        value: $(params.e2e-hcc-env)
      - name: HCC_ENV_URL
        value: $(params.e2e-hcc-env-url)
    runAfter:
    - clone-repository-oci-ta
    - build-image-index
    - run-unit-tests
    workspaces:
    - name: basic-auth
      workspace: git-auth
    - name: shared-workspace
      workspace: workspace
    taskSpec:
      params:
        - description: The Trusted Artifact URI pointing to the test source code
          name: SOURCE_ARTIFACT
          type: string
        - description: The built application image to test
          name: APPLICATION_IMAGE
          type: string
        - description: The script to execute the e2e tests
          name: e2e-tests-script
          type: string
        - description: The script to run the application
          name: run-app-script
          type: string
        - description: Name of ConfigMap containing proxy routes data
          name: PROXY_ROUTES_CONFIGMAP
          type: string
        - description: Application port (default 8000)
          name: APP_PORT
          type: string
        - description: Playwright image to use for testing
          name: PLAYWRIGHT_IMAGE
          type: string
        - description: Frontend proxy image
          name: PROXY_IMAGE
          type: string
        - description: Name of the secret containing e2e credentials
          name: CREDENTIALS_SECRET
          type: string
        - description: HCC environment (e.g., stage, prod)
          name: HCC_ENV
          type: string
        - description: HCC environment URL
          name: HCC_ENV_URL
          type: string
      workspaces:
      - name: shared-workspace
        mountPath: /var/workdir
      volumes:
      - name: proxy-config
        emptyDir: {}
      - name: proxy-routes-configmap
        configMap:
          name: $(params.PROXY_ROUTES_CONFIGMAP)
          optional: true
          items:
          - key: routes
            path: routes
      sidecars:
      - image: $(params.PROXY_IMAGE)
        name: frontend-dev-proxy
        command: ["/bin/sh", "-c"]
        args:
        - |
          #!/bin/sh
          echo "Waiting for /config/routes to be available..."
          timeout=60
          max_wait=120
          elapsed=0
          while [ ! -f /config/routes ] && [ $elapsed -lt $timeout ]; do
            echo "Config file not found, waiting... ($elapsed/$timeout seconds)"
            sleep 2
            elapsed=$((elapsed + 2))
          done

          if [ ! -f /config/routes ]; then
            echo "ERROR: /config/routes not found after ${timeout} seconds"
            exit 1
          fi

          echo "Config file found!"
          echo "Routes content:"
          cat /config/routes

          # Export LOCAL_ROUTES environment variable from the file
          export LOCAL_ROUTES="$(cat /config/routes)"
          echo "LOCAL_ROUTES environment variable set"

          # Validate HCC_ENV_URL is set
          if [ -z "${HCC_ENV_URL}" ]; then
            echo "ERROR: HCC_ENV_URL environment variable is not set!"
            echo "This is required for proxying and other upstream routes."
            exit 1
          fi

          # Wait for run-application to be ready on port 8000
          echo "Waiting for run-application to be ready on port 8000..."
          elapsed=0
          while [ $elapsed -lt $max_wait ]; do
            if wget -q -O /dev/null --timeout=2 http://127.0.0.1:8000 2>/dev/null; then
              echo "run-application is ready!"
              break
            fi
            echo "Waiting for run-application... ($elapsed/$max_wait seconds)"
            sleep 2
            elapsed=$((elapsed + 2))
          done

          if [ $elapsed -ge $max_wait ]; then
            echo "WARNING: run-application did not become ready after ${max_wait} seconds"
            exit 1
          fi

          echo "Starting frontend-development-proxy using container's template Caddyfile..."
          caddy run --config /etc/caddy/Caddyfile
        envFrom:
        - secretRef:
            name: $(params.CREDENTIALS_SECRET)
            optional: false
        env:
        - name: NO_PROXY
          value: "127.0.0.1,localhost"
        - name: HCC_ENV
          value: $(params.HCC_ENV)
        - name: PROXY_PORT
          value: "1337"
        # Backwards compatibility: explicit mappings for env vars that don't match envFrom conversion
        - name: E2E_USER
          valueFrom:
            secretKeyRef:
              name: $(params.CREDENTIALS_SECRET)
              key: e2e-user
              optional: true
        - name: E2E_PASSWORD
          valueFrom:
            secretKeyRef:
              name: $(params.CREDENTIALS_SECRET)
              key: e2e-password
              optional: true
        - name: HCC_ENV_URL
          value: $(params.HCC_ENV_URL)
        - name: STAGE_ACTUAL_HOSTNAME
          valueFrom:
            secretKeyRef:
              name: $(params.CREDENTIALS_SECRET)
              key: e2e-stage-actual-hostname
              optional: true
        securityContext:
          privileged: false
        volumeMounts:
        - name: proxy-config
          mountPath: /config
      - name: run-application
        image: $(params.APPLICATION_IMAGE)
        command: ["/bin/sh", "-c"]
        args:
        - $(params.run-app-script)
        env:
        - name: HCC_ENV_URL
          value: $(params.HCC_ENV_URL)
        securityContext:
          privileged: false
      steps:
        - name: setup-proxy-routes
          image: quay.io/quay/busybox
          script: |
            #!/bin/sh
            set -e

            # Check if ConfigMap data is available
            if [ ! -f /configmap-data/routes ]; then
              echo "ERROR: ConfigMap routes file not found at /configmap-data/routes"
              echo "Please ensure the ConfigMap is properly configured with a 'routes' key"
              exit 1
            fi

            if [ ! -s /configmap-data/routes ]; then
              echo "ERROR: ConfigMap routes file is empty"
              exit 1
            fi

            echo "Using routes from ConfigMap..."
            cp /configmap-data/routes /config/routes
            chmod 644 /config/routes
            echo "Routes content:"
            cat /config/routes
          volumeMounts:
            - name: proxy-config
              mountPath: /config
            - name: proxy-routes-configmap
              mountPath: /configmap-data
        - image: $(params.PLAYWRIGHT_IMAGE)
          envFrom:
            - secretRef:
                name: $(params.CREDENTIALS_SECRET)
                optional: false
          env:
            - name: NO_PROXY
              value: "stage.foo.redhat.com,prod.foo.redhat.com"
            # Backwards compatibility: explicit mappings for env vars that don't match envFrom conversion
            - name: E2E_USER
              valueFrom:
                secretKeyRef:
                  name: $(params.CREDENTIALS_SECRET)
                  key: e2e-user
                  optional: true
            - name: E2E_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: $(params.CREDENTIALS_SECRET)
                  key: e2e-password
                  optional: true
            - name: HCC_ENV_URL
              value: $(params.HCC_ENV_URL)
            - name: STAGE_ACTUAL_HOSTNAME
              valueFrom:
                secretKeyRef:
                  name: $(params.CREDENTIALS_SECRET)
                  key: e2e-stage-actual-hostname
                  optional: true
          name: e2e-tests
          workingDir: /var/workdir
          computeResources:
            requests:
              cpu: "2000m"
              memory: "4Gi"
            limits:
              cpu: "4000m"
              memory: "8Gi"
          securityContext:
            runAsUser: 0
          script: |
            #!/bin/bash
            # Execute the e2e tests script with secrets available as env vars
            $(params.e2e-tests-script)
  workspaces:
  - name: workspace
  - name: git-auth
    optional: true
  - name: netrc
    optional: true
