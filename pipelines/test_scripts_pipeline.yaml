---
# Single arch build (amd64)
# Note, that we keep the multi-arch filename because we dont want to change refs in all repos
apiVersion: tekton.dev/v1
kind: Pipeline
metadata:
  name: test-script-pipeline
spec:
  workspaces:
    - name: git-auth
      optional: true
    - name: netrc
      optional: true
    - name: workspace
      description: workspace for the source code

  params:
    - default: ""
      description: Script which will be executed as part of testing
      name: script-to-execute
      type: string
    - default: ""
      description: Script to run in ephemeral namespace. If empty, ephemeral namespace tasks are skipped.
      name: ephemeral-namespace-run-script
      type: string
      # https://catalog.redhat.com/software/containers/openshift4/ose-cli/5cd9ba3f5a13467289f4d51d/history?architecture=amd64
    - default: "false"
      description: Skip checks against built image
      name: skip-checks
      type: string
    - name: enable-cache-proxy
      default: 'false'
      description: Enable cache proxy configuration
      type: string
    - default: ""
      description: Revision of the Source Repository
      name: revision
      type: string
    - description: Fully Qualified Output Image
      name: output-image
      type: string
    - default: ""
      description: Image tag expiration time, time values could be something like 1h, 2d, 3w for hours, days, and weeks, respectively.
      name: image-expires-after
    - name: component-name
      type: string
      description: Component name
      default: ""
    - default: "false"
      description: Force rebuild image
      name: rebuild
      type: string
    - name: SNAPSHOT
      type: string
      description: |
        Spec section of an ApplicationSnapshot resource. Not all fields of the
        resource are required. A minimal example:
          {
            "components": [
              {
                "containerImage": "quay.io/example/repo:latest"
              }
            ]
          }
        Each "containerImage" in the "components" array is validated.
    - default: "v4.15"
      description: Tag of the OpenShift CLI from registry.redhat.io/openshift4/ose-cli to use for ephemeral namespace tasks.
      name: ephemeral-namespace-oc-cli-version
      type: string
    - name: HOMEDIR
      type: string
      description: Value for the HOME environment variable.
      default: /tekton/home

  tasks:
    - name: return-git-rev-url
      params:
        - name: SNAPSHOT
          value: $(params.SNAPSHOT)
        - name: SINGLE_COMPONENT
          value: $(params.component-name)
        - name: HOME
          value: $(params.HOMEDIR)
      taskSpec:
        params:
          - name: SINGLE_COMPONENT
            type: string
          - name: SNAPSHOT
            type: string
          - name: HOME
            type: string

        steps:
          - name: ec-cli
            image: quay.io/enterprise-contract/ec-cli:snapshot
            onError: continue # progress even if the step fails so we can see the debug logs
            script: |
              echo -n ${SNAPSHOT} | jq -r '.components[] | select(.name == env.SINGLE_COMPONENT) | .source.git.url' | tr -d '\n' > "${GIT_URL}"
              echo -n ${SNAPSHOT} | jq -r '.components[] | select(.name == env.SINGLE_COMPONENT) | .source.git.revision' | tr -d '\n' > "${GIT_REVISION}"
              echo -n ${SNAPSHOT} | jq -r '.components[] | select(.name == env.SINGLE_COMPONENT) | .containerImage' | tr -d '\n' > "${CONTAINER_IMAGE}"
            env:
              - name: HOME
                value: $(params.HOMEDIR)
              - name: SNAPSHOT
                value: $(params.SNAPSHOT)
              - name: SINGLE_COMPONENT
                value: $(params.component-name)
              - name: GIT_URL
                value: $(results.git-url.path)
              - name: GIT_REVISION
                value: $(results.git-revision.path)
              - name: CONTAINER_IMAGE
                value: $(results.container-image.path)
        results:
          - name: git-url
          - name: git-revision
          - name: container-image

    - name: clone-repository
      params:
        - name: url
          value: $(tasks.return-git-rev-url.results.git-url)
        - name: revision
          value: $(tasks.return-git-rev-url.results.git-revision)
        - name: ociStorage
          value: $(params.output-image)-$(tasks.return-git-rev-url.results.git-revision).git
        - name: ociArtifactExpiresAfter
          value: $(params.image-expires-after)
      runAfter:
        - return-git-rev-url
      taskRef:
        params:
          - name: name
            value: git-clone
          - name: bundle
            value: quay.io/konflux-ci/tekton-catalog/task-git-clone:0.1-780298b8039a2ba917ce30517c3f64aec26c389e
          - name: kind
            value: task
        resolver: bundles
      workspaces:
        - name: basic-auth
          workspace: git-auth
        - name: output
          workspace: workspace

    - name: deploy-ephemeral-namespace
      runAfter:
        - clone-repository
      taskRef:
        resolver: git
        params:
          - name: url
            value: https://github.com/konflux-ci/build-definitions.git
          - name: revision
            # Note, we must use a concrete commit ID or enterprise contract will fail
            # The violation log will show you the allowed/trusted commit ref to use
            value: 05686269c33b8f1aac66252c0c7b859b42dca2ed
          - name: pathInRepo
            value: task/eaas-provision-space/0.1/eaas-provision-space.yaml
          - name: shortCommitLength
            value: 7
      params:
        - name: ownerName
          value: $(context.pipelineRun.name)
        - name: ownerUid
          value: $(context.pipelineRun.uid)
      when:
        - input: $(params.skip-checks)
          operator: in
          values:
            - "false"

      # For task compliance follow https://konflux.pages.redhat.com/docs/users/building/using-trusted-artifacts.html#migrate-to-trusted-artifacts
    - name: run-custom-script-in-ephemeral-namespace
      runAfter:
        - deploy-ephemeral-namespace
      params:
        - name: SCRIPT_PATH
          value: $(params.ephemeral-namespace-run-script)
        - name: CONTAINER_IMAGE
          value: $(tasks.return-git-rev-url.results.container-image)
        - name: SNAPSHOT
          value: $(params.SNAPSHOT)
        - name: OC_CLI_VERSION
          value: $(params.ephemeral-namespace-oc-cli-version)
      workspaces:
        - name: source
          workspace: workspace
      taskSpec:
        workspaces:
          - name: source
        params:
          - name: SCRIPT_PATH
            type: string
          - name: CONTAINER_IMAGE
            type: string
          - name: SNAPSHOT
            type: string
          - name: OC_CLI_VERSION
            type: string

        steps:
            # New step to fetch the Trusted Artifact and make it available to the next steps.
          - name: run-script
            image: registry.redhat.io/openshift4/ose-cli:$(params.OC_CLI_VERSION)
            workingDir: $(workspaces.source.path)
            env:
              - name: KUBECONFIG_VALUE
                valueFrom:
                  secretKeyRef:
                    name: "$(tasks.deploy-ephemeral-namespace.results.secretRef)"
                    key: kubeconfig
              - name: SCRIPT_PATH
                value: $(params.SCRIPT_PATH)
              - name: CONTAINER_IMAGE
                value: $(params.CONTAINER_IMAGE)
              - name: SNAPSHOT
                value: $(params.SNAPSHOT)
            script: |
              #!/usr/bin/env bash
              set -euo pipefail

              # Expose KUBECONFIG for test namespace
              echo "$KUBECONFIG_VALUE" > /tmp/cfg
              export KUBECONFIG=/tmp/cfg

              # SNAPSHOT var
              echo "Snapshot: $SNAPSHOT"

              echo "Running script ${SCRIPT_PATH}"
              cd /workspace/source/source
              chmod +x ./${SCRIPT_PATH}
              ./${SCRIPT_PATH}
      when:
        - input: $(params.skip-checks)
          operator: in
          values:
            - "false"
        - input: $(params.ephemeral-namespace-run-script)
          operator: notin
          values:
            - ""
